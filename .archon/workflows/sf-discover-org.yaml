name: sf-discover-org
description: |
  Generate baseline engagement documentation from SFDX metadata. One-time
  per engagement (re-runnable after sandbox refresh). Inventories existing
  custom objects, customized standard objects, Flows, Apex, and external
  integrations; writes the canonical docs (objects/, flows/, integrations/)
  and derived feature docs (features/) per ADR-0010's taxonomy.

  Read-only on `force-app/`. Does NOT deploy, run tests, or modify metadata.
  Documentation-only workflow.

  Per ADR-0011 §Idempotency contract: re-runs preserve hand-edits
  (docs whose frontmatter `last_updated_by` is not `archon-*`).

  Invoked via Claude Code slash command `/sf-discover` or by direct
  `archon workflow run sf-discover-org` invocation.

provider: claude
model: sonnet

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: VALIDATE + CLASSIFY
  # ═══════════════════════════════════════════════════════════════

  - id: smoke-validate-sfdx
    prompt: |
      Verify this engagement is an SFDX project with retrieved metadata
      to document. Bail fast if not.

      Checks:
      1. `sfdx-project.json` exists at the engagement root.
      2. `force-app/main/default/` directory exists and is non-empty.
      3. At least one of: `objects/`, `classes/`, `triggers/`, `flows/`
         directories exists under `force-app/main/default/`.

      If any check fails, output `sfdx_present: "false"` with reasoning
      that includes the specific fix the engineer needs (e.g., "run
      `sf project retrieve start` first to pull metadata into source").

      If all checks pass, output `sfdx_present: "true"` and list the
      categories that have content (objects / classes / triggers /
      flows / etc.).
    allowed_tools: [Read, Glob, Bash]
    output_format:
      type: object
      properties:
        sfdx_present:
          type: string
          enum: ["true", "false"]
        force_app_path:
          type: string
        categories_present:
          type: array
          items:
            type: string
        reasoning:
          type: string
      required: [sfdx_present, force_app_path, categories_present, reasoning]

  - id: classify-significance
    command: sf-discover-classify
    depends_on: [smoke-validate-sfdx]
    when: "$smoke-validate-sfdx.output.sfdx_present == 'true'"
    context: fresh
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: COST-CONFIRM GATE
  # Show the engineer what discovery will do and an estimated token cost,
  # before kicking off the three parallel opus[1m] agents.
  # ═══════════════════════════════════════════════════════════════

  - id: confirm-cost
    prompt: |
      You are the cost-confirmation gate. Show the engineer the discovery
      plan and an estimated token / dollar cost based on the artifact
      count from `classify-significance`, then ask them to proceed.

      ## Display

      ```
      ───────────────────────────────────────────────
      sf-discover-org plan

      Engagement:        $force_app_path
      Significant objects:        N (per classify output)
      Significant flows:          N
      External integrations:      N
      Apex classes referenced:    N

      Will write or update:
        docs/objects/<Object>.md            (N files)
        docs/flows/<Flow>.md                (N files)
        docs/integrations/<System>.md       (N files)
        docs/security/sharing-model.md      (1 file, consolidated)
        docs/security/custom-permissions.md
        docs/security/public-groups-and-queues.md
        docs/security/apex-sharing.md
        docs/security/profiles/<Profile>.md (N files, per ADR-0013)
        docs/security/permission-sets/<PS>.md (N files, per ADR-0013)
        docs/features/<slug>.md             (after synthesis; usually 3–8)
        docs/index.md                       (rebuilt)

      Estimated tokens:  ~<calculated> M (mostly opus[1m] for parallel
                          document-* nodes; sonnet for synthesis/index)
      Estimated cost:    ~$<calculated> at current Anthropic pricing

      Idempotency: re-runs preserve docs whose frontmatter
      `last_updated_by` does not start with `archon-`.

      Proceed? [y/N]
      ───────────────────────────────────────────────
      ```

      ## Token-estimate formula (rough)

      Per significant object: ~50K input + ~5K output (sonnet $/Mtok = $3 in, $15 out;
      opus = ~5x). For opus on objects: ~$0.225 per object.
      Flows: ~$0.15 per flow.
      Integrations: ~$0.20 per system.
      Security overview (sharing-model + custom-perms + groups + apex-sharing + PSG): ~$0.40 flat.
      Profiles: ~$0.15 per profile (per ADR-0013).
      Permission sets: ~$0.10 per PS (per ADR-0013).
      Synthesis + index: ~$0.50 flat.

      Estimate = 0.225 * N_objects + 0.15 * N_flows + 0.20 * N_integrations
                + 0.40 + 0.15 * N_profiles + 0.10 * N_permission_sets + 0.50

      ## Engineer response

      Accept: `y` / `yes` → `proceed: "true"`
      Accept: `n` / `no` / empty (default) → `proceed: "false"`

      No typed-CONFIRM ceremony — discovery is non-destructive (read-only on force-app/,
      idempotent on docs/). `y`/`N` is sufficient.
    depends_on: [classify-significance]
    when: "$smoke-validate-sfdx.output.sfdx_present == 'true'"
    context: fresh
    output_format:
      type: object
      properties:
        proceed:
          type: string
          enum: ["true", "false"]
        reasoning:
          type: string
      required: [proceed, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: CATEGORY-PARALLEL DOCUMENTATION
  # Three opus[1m] agents run in parallel, each documenting one category.
  # ═══════════════════════════════════════════════════════════════

  - id: document-objects
    command: sf-discover-document-objects
    depends_on: [confirm-cost]
    when: "$confirm-cost.output.proceed == 'true'"
    context: fresh
    model: opus[1m]

  - id: document-flows
    command: sf-discover-document-flows
    depends_on: [confirm-cost]
    when: "$confirm-cost.output.proceed == 'true'"
    context: fresh
    model: opus[1m]

  - id: document-integrations
    command: sf-discover-document-integrations
    depends_on: [confirm-cost]
    when: "$confirm-cost.output.proceed == 'true'"
    context: fresh
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3.5: SECURITY DOCUMENTATION (per ADR-0013)
  # Three parallel opus[1m] agents document the engagement's security
  # posture. Run wall-clock-parallel with the document-objects/flows/
  # integrations nodes above; together six nodes fan out from
  # confirm-cost.
  # ═══════════════════════════════════════════════════════════════

  - id: document-security-overview
    command: sf-discover-document-security-overview
    depends_on: [confirm-cost]
    when: "$confirm-cost.output.proceed == 'true'"
    context: fresh
    model: opus[1m]

  - id: document-security-profiles
    command: sf-discover-document-profiles
    depends_on: [confirm-cost]
    when: "$confirm-cost.output.proceed == 'true'"
    context: fresh
    model: opus[1m]

  - id: document-security-permission-sets
    command: sf-discover-document-permission-sets
    depends_on: [confirm-cost]
    when: "$confirm-cost.output.proceed == 'true'"
    context: fresh
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: SYNTHESIZE FEATURES + UPDATE INDEX
  # Synthesis reads ALL category docs (objects/flows/integrations +
  # security/*) before clustering into business features. Update-index
  # rebuilds the master index with the security section included.
  # ═══════════════════════════════════════════════════════════════

  - id: synthesize-features
    command: sf-discover-synthesize-features
    depends_on:
      - document-objects
      - document-flows
      - document-integrations
      - document-security-overview
      - document-security-profiles
      - document-security-permission-sets
    trigger_rule: all_success
    context: fresh
    model: sonnet

  - id: update-index
    command: sf-discover-update-index
    depends_on: [synthesize-features]
    context: fresh
    model: sonnet

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: LOG
  # ═══════════════════════════════════════════════════════════════

  - id: log-discovery-run
    bash: |
      set -euo pipefail

      N_OBJECTS=$(ls docs/objects/*.md 2>/dev/null | grep -v README.md | wc -l)
      N_FLOWS=$(ls docs/flows/*.md 2>/dev/null | grep -v README.md | wc -l)
      N_INTEGRATIONS=$(ls docs/integrations/*.md 2>/dev/null | grep -v README.md | wc -l)
      N_FEATURES=$(ls docs/features/*.md 2>/dev/null | grep -v README.md | wc -l)
      N_PROFILES=$(ls docs/security/profiles/*.md 2>/dev/null | grep -v README.md | wc -l)
      N_PSETS=$(ls docs/security/permission-sets/*.md 2>/dev/null | grep -v README.md | wc -l)

      RUN_LOG="_internal/harness-runs.log"
      mkdir -p "$(dirname "$RUN_LOG")"
      printf '%s  -  sf-discover-org  objects=%d  flows=%d  integrations=%d  features=%d  profiles=%d  psets=%d  result=success\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${N_OBJECTS}" "${N_FLOWS}" "${N_INTEGRATIONS}" "${N_FEATURES}" "${N_PROFILES}" "${N_PSETS}" \
        >> "$RUN_LOG"

      # Cost record per ADR-0016. /sf-discover-org is the most expensive
      # workflow — 6 parallel opus[1m] nodes + sonnet synthesis + index.
      # Cost scales with artifact count. Per-doc estimates from ADR-0013
      # cost analysis: ~$0.225/object, $0.15/flow, $0.20/integration,
      # $0.15/profile, $0.10/PS, $0.40 security overview, $0.50 synth+index.
      ENGAGEMENT_ALIAS=$(grep -E '^engagement_alias:' engagement.yaml 2>/dev/null | head -1 | sed -E 's/^engagement_alias:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' || echo "unknown")
      HARNESS_VERSION=$(grep -E '^harness_version:' engagement.yaml 2>/dev/null | head -1 | sed -E 's/^harness_version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' || echo "unknown")
      EST_COST_USD=$(python3 -c "
cost = (0.225 * $N_OBJECTS) + (0.15 * $N_FLOWS) + (0.20 * $N_INTEGRATIONS) + (0.15 * $N_PROFILES) + (0.10 * $N_PSETS) + 0.40 + 0.50
print(f'{cost:.2f}')
")
      # Token estimates derived from cost (opus[1m] roughly $20/Mtok input, $100/Mtok output)
      EST_INPUT_TOKENS=$(python3 -c "print(int(($EST_COST_USD * 0.7) / 20 * 1_000_000))")
      EST_OUTPUT_TOKENS=$(python3 -c "print(int(($EST_COST_USD * 0.3) / 100 * 1_000_000))")

      COST_LOG="_internal/cost-log.jsonl"
      # Approximate node counts: 6 opus_1m (3 docs + 3 security), 2 sonnet (synth, index), 1 bash
      printf '{\"ts\":\"%s\",\"workflow\":\"sf-discover-org\",\"ticket\":null,\"engagement\":\"%s\",\"harness_version\":\"%s\",\"nodes\":{\"sonnet\":2,\"opus_1m\":6,\"bash\":1},\"est_input_tokens\":%d,\"est_output_tokens\":%d,\"est_cost_usd\":%s,\"result\":\"success\",\"artifacts\":{\"objects\":%d,\"flows\":%d,\"integrations\":%d,\"features\":%d,\"profiles\":%d,\"permission_sets\":%d}}\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${ENGAGEMENT_ALIAS}" "${HARNESS_VERSION}" \
        "$EST_INPUT_TOKENS" "$EST_OUTPUT_TOKENS" "$EST_COST_USD" \
        "${N_OBJECTS}" "${N_FLOWS}" "${N_INTEGRATIONS}" "${N_FEATURES}" "${N_PROFILES}" "${N_PSETS}" \
        >> "$COST_LOG"
    depends_on: [update-index]
