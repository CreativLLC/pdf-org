name: Deploy docs to GitHub Pages

# Per ADR-0010: every push to `main` that changes docs/ or mkdocs.yml
# rebuilds and redeploys the engagement's MkDocs Material site.
#
# Bootstrapped by harness-init.sh. Edit per-engagement only if the
# repository requires a custom deploy path or branch protection rules.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; queue subsequent pushes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed if any plugin uses git-revision-date (none today,
          # but cheap and future-proof).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Build site
        # Strict mode disabled for now — engagement docs grow organically
        # and stub README files often link to files that don't yet exist.
        # Re-enable per-engagement once docs stabilize.
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
