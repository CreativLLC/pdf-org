# mkdocs.yml — MkDocs Material configuration for engagement documentation.
# Per ADR-0010: renders docs/*.md as a polished doc site for humans
# (admins, stakeholders, occasionally clients). Same .md files are also
# loaded directly by AI agents via docs/index.md → INDEX nav.
#
# Bootstrapped into every engagement by harness-init.sh. Edit per-engagement
# only for client name and the GitHub Pages URL.

site_name: Meditrina — Engagement Documentation
site_description: Holistic, state-of-the-org docs for the Meditrina engagement. Updated automatically as `/sf` workflows run.
site_url: https://CreativLLC.github.io/pdf-org/

# Source / destination
docs_dir: docs
site_dir: site

# Repo link (top-right of every page)
repo_name: CreativLLC/pdf-org
repo_url: https://github.com/CreativLLC/pdf-org
edit_uri: edit/main/docs/

# What to NOT publish (per ADR-0010 §5 "What stays inside") + internal-only
# subdirs that aren't user-facing (patterns/standards are engagement-specific
# engineer overrides; changelog is deprecated per ADR-0010 but historical
# entries may linger in older engagements).
exclude_docs: |
  _internal/
  .harness-templates/
  changelog/
  patterns/
  standards/

# Theme
theme:
  name: material
  language: en
  features:
    - navigation.instant         # SPA-like nav, fast page transitions
    - navigation.tracking         # URL updates as you scroll through sections
    - navigation.indexes          # section index pages (sectionname/index.md)
    # Note: navigation.sections is intentionally OFF. With it on, top-level
    # sections render as bold non-clickable headers with all children always
    # visible — a flat list. Off, they become collapsible groups: click a
    # section header to expand/collapse its children. Much more usable once
    # an engagement has 20+ objects/features/flows.
    - navigation.top              # back-to-top button
    - navigation.footer           # prev/next page links at bottom
    - search.suggest              # autocomplete in search box
    - search.highlight            # highlight search hits on the page
    - search.share                # shareable search URLs
    - content.code.copy           # copy-button on every code block
    - content.tabs.link           # linkable tabbed content
    - content.action.edit         # 'edit this page' link
    - toc.follow                  # right-sidebar TOC tracks current section
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  # awesome-pages: auto-discover every .md in docs/ and build the sidebar from
  # the directory tree. New object/feature/flow/integration docs written by /sf
  # runs appear in the sidebar automatically — no manual nav: edits needed.
  # Per-section ordering (when wanted) goes in a tiny `.pages` file inside the
  # directory, e.g. `docs/features/.pages`:
  #   title: Business Features
  #   nav:
  #     - renewal-pipeline.md     # pin the most important first
  #     - "..."                   # everything else, alphabetical
  # No .pages file = pure alphabetical, which is fine for most engagements.
  - awesome-pages
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      # Lunr search; tokenizes camelCase-style names so 'RenewalCalc' finds 'RenewalCalculator'

# Markdown extensions
markdown_extensions:
  - admonition                    # note/warning/tip callouts
  - pymdownx.details              # collapsible sections
  - pymdownx.superfences:         # nested code blocks, mermaid
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:              # tabbed content blocks
      alternate_style: true
  - pymdownx.highlight:           # syntax highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite         # inline syntax-highlighted code
  - pymdownx.snippets             # include external files
  - tables                        # standard markdown tables
  - attr_list                     # add HTML attrs to elements
  - md_in_html                    # render markdown inside HTML blocks
  - toc:
      permalink: '¶'
      toc_depth: 3

# Navigation: built automatically by awesome-pages from the docs/ directory
# tree (per ADR-0010 + ADR-0012). Each subdirectory becomes a section using
# its README.md (or index.md) as the section landing page. Customize ordering
# per section by dropping a `.pages` file in that directory — see the example
# in the plugins block above.
#
# Why no explicit `nav:`: with one, MkDocs hides everything not listed.
# /sf runs write new object/feature/flow docs as they land; an explicit nav
# means they're orphaned (URLs work, sidebar doesn't link them). See GRIM-49
# postmortem in ADR-0012.

# Strict mode kept OFF for now — engagement docs grow organically (broken
# links to stub-only files are normal during early stages). Re-enable once
# an engagement's docs have stabilized.
# strict: true
