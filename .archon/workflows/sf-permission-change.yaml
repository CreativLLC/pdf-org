name: sf-permission-change
description: |
  Phase 7 task-family workflow per ADR-0003. Handles profiles, permission
  sets, permission set groups, sharing rules, OWD (Org-Wide Defaults), and
  Restriction Rules — create / modify / delete. Sub-types, gates, and
  validation strategy locked in ADR-0020.

  HIGHEST BLAST RADIUS of any Phase 7 family. Gate model is deliberately
  strict:
    • modify-owd               → literal `CONFIRM-OWD` (uppercase, exact)
    • delete-* / destructive   → literal `CONFIRM`
    • non-destructive profile  → `y` / `yes`
    • routine PSG addition     → gate skipped

  Invoked by sf-dispatcher when the classifier picks this family, OR
  invoked by sf-orchestrator with `--orchestrated true` when a ticket
  spans multiple families (ADR-0017).

  Inputs:
    $ARGUMENTS  — passed by sf-dispatcher / sf-orchestrator:
                  Single-family form: `<TICKET> "<description>"`.
                  Orchestrated form:  `<TICKET> --orchestrated true "<description>"`.
                  Orchestrated mode is detected by grep-ing $ARGUMENTS for
                  `--orchestrated true` — when set, update-jira-* nodes are
                  suppressed and log-workflow-run writes a family_result.json
                  to disk for the orchestrator to read.

  Structural backbone per ADR-0003:
    1. extract-jira-key             (deterministic)
    2. pull-jira-context            (command: pull-jira-context)
    3. classify-sub-type            (LLM, scoped to this task family)
    4. smoke-validate-claims        (verify ticket's concrete claims)
    5. verify-org-context           (command: verify-org-context)
    6. load-engagement-context      (command: load-engagement-context)
    7. plan                         (command: sf-permission-change-plan)
    8. gate-pre-execute             (interactive, conditional per ADR-0020)
    9. execute                      (command: sf-permission-change-execute)
    10. validate                    (command: sf-permission-change-validate)
    11. gate-post-validate          (interactive, conditional)
    12. document                    (command: sf-permission-change-document)
    13. update-jira                 (post comment + transition; suppressed if orchestrated)
    14. log                         (always; emits family_result if orchestrated)

provider: claude
model: sonnet

# Orchestrated mode (per ADR-0017) is detected by grep'ing for
# '--orchestrated true' in $ARGUMENTS — matching the sf-apex-change.yaml
# pattern. update-jira-* nodes are suppressed and log-workflow-run writes
# family_result.json to disk for the orchestrator to read.

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: FETCH & CLASSIFY
  # ═══════════════════════════════════════════════════════════════

  - id: extract-jira-key
    prompt: |
      Extract the Jira ticket key from $ARGUMENTS.

      Input: $ARGUMENTS  (e.g., `--ticket ACME-201 --description "..."`)

      The ticket key must match `^[A-Z][A-Z0-9]+-\d+$`. If absent or
      malformed, fail with:
        `error: missing or invalid --ticket. Expected like ACME-201.`

      Output ONLY the bare ticket key (no quotes, markdown, or extra text).
    allowed_tools: []
    output_format:
      type: object
      properties:
        ticket:
          type: string
          pattern: "^[A-Z][A-Z0-9]+-\\d+$"
        description:
          type: string
      required: [ticket, description]

  - id: pull-jira-context
    command: pull-jira-context
    depends_on: [extract-jira-key]
    context: fresh

  - id: classify-sub-type
    prompt: |
      You are the sf-permission-change sub-type classifier. The dispatcher
      already chose this family; your job is to pick the correct sub-type
      from ADR-0020 §1, plus scope and side flags.

      ## Context

      ### Jira ticket
      $pull-jira-context.output

      ### Engineer's free-form description
      $extract-jira-key.output.description

      ## Sub-types (ADR-0020)

      | sub_type                       | Triggered by                                                       |
      |--------------------------------|--------------------------------------------------------------------|
      | `create-permission-set`        | New `*.permissionset-meta.xml`                                     |
      | `modify-permission-set`        | Existing PS XML changed                                            |
      | `delete-permission-set`        | PS file removed (DESTRUCTIVE)                                      |
      | `create-permission-set-group`  | New `*.permissionsetgroup-meta.xml`                                |
      | `modify-permission-set-group`  | PSG composition changed                                            |
      | `delete-permission-set-group`  | PSG removed (DESTRUCTIVE)                                          |
      | `modify-profile`               | Existing `*.profile-meta.xml` changed (NEVER `create-profile`)     |
      | `create-sharing-rule`          | New rule in `*.sharingRules-meta.xml`                              |
      | `modify-sharing-rule`          | Existing sharing rule changed                                      |
      | `delete-sharing-rule`          | Sharing rule removed (DESTRUCTIVE)                                 |
      | `modify-owd`                   | `<sharingModel>` in `<Object>.object-meta.xml` changed (NUCLEAR)   |
      | `create-restriction-rule`      | New `*.restrictionRule-meta.xml`                                   |
      | `modify-restriction-rule`      | Existing restriction rule changed                                  |
      | `delete-restriction-rule`      | Restriction rule removed (DESTRUCTIVE)                             |

      ## Precedence (when ticket implies multiple)

      `modify-owd` > `delete-*` > `modify-profile` >
      `modify-permission-set-group` > `modify-permission-set` >
      `create-*` > restriction-rule sub-types.

      Higher-precedence sub-types have stricter gates; over-gate is safer.

      ## No `create-profile`

      Profiles cannot be created via SFDX in any sane workflow — they're
      created in Setup and retrieved into source afterward. If the ticket
      implies creating a brand-new profile from nothing, treat it as a
      misclassification: emit `modify-profile` with `reasoning` noting that
      the engineer must first create the profile in Setup, then re-run.

      ## Scope

      Estimate conservatively (round up when uncertain):
      - small:  1-2 artifacts (e.g., one PS edit; one sharing rule)
      - medium: 3-5 artifacts (e.g., one profile + one PS edited)
      - large:  6+ artifacts, OR ANY modify-owd, OR cross-cutting (e.g.,
                "tighten access to Renewal__c across all profiles")

      modify-owd is automatically promoted to at least `medium` regardless
      of artifact count — the blast radius is per-record, not per-file.

      ## Side flags

      - `affects_admin_profile`: `"true"` if the change clearly touches a
        profile labeled `System Administrator` or similar elevated profile.
        Used by post-validate to detect potential admin lockout.
      - `affects_critical_object`: `"true"` if the change touches the OWD
        or sharing model of an object the engagement docs label as
        business-critical (heuristic: object is referenced in
        `docs/architecture/overview.md` OR has a `docs/objects/<Object>.md`
        with a non-empty "Business criticality" section).
      - `removes_custom_permission_grant`: `"true"` if the change clearly
        drops a `<customPermissions>` entry from any profile/PS. Triggers
        the orphan check in validate.
    depends_on: [pull-jira-context]
    model: haiku
    allowed_tools: []
    context: fresh
    output_format:
      type: object
      properties:
        sub_type:
          type: string
          enum:
            - create-permission-set
            - modify-permission-set
            - delete-permission-set
            - create-permission-set-group
            - modify-permission-set-group
            - delete-permission-set-group
            - modify-profile
            - create-sharing-rule
            - modify-sharing-rule
            - delete-sharing-rule
            - modify-owd
            - create-restriction-rule
            - modify-restriction-rule
            - delete-restriction-rule
        scope:
          type: string
          enum: [small, medium, large]
        affects_admin_profile:
          type: string
          enum: ["true", "false"]
        affects_critical_object:
          type: string
          enum: ["true", "false"]
        removes_custom_permission_grant:
          type: string
          enum: ["true", "false"]
        reasoning:
          type: string
      required:
        - sub_type
        - scope
        - affects_admin_profile
        - affects_critical_object
        - removes_custom_permission_grant
        - reasoning

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1.5: SMOKE-VALIDATE
  # Same shape as sf-apex-change: verify ticket claims about specific
  # profile / PS / object / rule names against the current metadata.
  # ═══════════════════════════════════════════════════════════════

  - id: smoke-validate-claims
    prompt: |
      You are the smoke validator. Check that the ticket's claims about
      permission artifacts are ACCURATE before downstream gates rest on
      them.

      ## Context

      ### Ticket
      $pull-jira-context.output

      ### Classifier output
      $classify-sub-type.output

      ## Task

      Extract concrete, verifiable claims:
      - Profile names (e.g. `Sales_Manager`, `System_Administrator`).
      - Permission Set names (e.g. `Renewal_Approver_PS`).
      - Permission Set Group names.
      - Sharing rule names.
      - Object names whose OWD or sharing changes (e.g. `Renewal__c`).
      - Custom Permission names referenced.
      - Specific permission strings (e.g. `viewAllRecords on Renewal__c`).

      Verify each claim against `force-app/main/default/`:
      - Profile: `force-app/main/default/profiles/<name>.profile-meta.xml`
      - PS: `force-app/main/default/permissionsets/<name>.permissionset-meta.xml`
      - PSG: `force-app/main/default/permissionsetgroups/<name>.permissionsetgroup-meta.xml`
      - Sharing rule: `force-app/main/default/sharingRules/<Object>.sharingRules-meta.xml`
      - OWD: `force-app/main/default/objects/<Object>/<Object>.object-meta.xml`
        → `<sharingModel>` element.
      - Restriction rule: `force-app/main/default/objects/<Object>/restrictionRules/<name>.restrictionRule-meta.xml`
      - Custom Permission: `force-app/main/default/customPermissions/<name>.customPermission-meta.xml`

      ## Budget

      ~30 seconds. Check the 2-3 most load-bearing claims. Prefer
      false-negative safety (flag inaccurate when uncertain) over
      false-positive (skipping a gate on shaky ground).

      If the ticket has no concrete claims (purely descriptive — e.g.,
      "tighten sharing on Renewal" with no specific profile/PS/rule
      names), default `claims_accurate` to `"false"`. Vague tickets
      should hit the full pipeline including the pre-execute gate.

      ## Output

      - `claims_accurate`: `"true"` if claims match; `"false"` otherwise.
      - `mismatches`: list of discrepancies (one string each).
    depends_on: [classify-sub-type]
    context: fresh
    output_format:
      type: object
      properties:
        claims_accurate:
          type: string
          enum: ["true", "false"]
        mismatches:
          type: array
          items:
            type: string
        reasoning:
          type: string
      required: [claims_accurate, mismatches, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: SF-SPECIFIC CONTEXT
  # ═══════════════════════════════════════════════════════════════

  - id: verify-org-context
    command: verify-org-context
    depends_on: [smoke-validate-claims]
    context: fresh

  - id: load-engagement-context
    command: load-engagement-context
    depends_on: [verify-org-context]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: PLAN
  # The plan step is required (per ADR-0020 §2) to compute
  # `removes_access` by comparing the planned XML against HEAD-of-branch.
  # The pre-execute gate uses this flag to choose CONFIRM vs y/yes.
  # ═══════════════════════════════════════════════════════════════

  - id: plan
    command: sf-permission-change-plan
    depends_on: [load-engagement-context, classify-sub-type, smoke-validate-claims]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: GATE — pre-execute (conditional per ADR-0020 §2)
  #
  # The gate fires for ALL sub-types EXCEPT the single explicit skip
  # case: modify-permission-set-group + scope=small + accurate-claims.
  # That's intentional — this family has the highest blast radius and
  # the friction is the design.
  #
  # The CONFIRMATION FORM is chosen inside the gate prompt based on
  # sub_type + plan.removes_access / narrows_access / tightens:
  #   - sub_type == 'modify-owd'                                         → CONFIRM-OWD
  #   - sub_type ∈ {'delete-permission-set',
  #                 'delete-permission-set-group',
  #                 'delete-sharing-rule',
  #                 'delete-restriction-rule'}                            → CONFIRM
  #   - sub_type == 'modify-profile' AND plan.removes_access             → CONFIRM
  #   - sub_type == 'modify-profile' (additive only)                     → y/yes
  #   - sub_type == 'modify-permission-set' AND plan.removes_access      → CONFIRM
  #   - sub_type == 'modify-permission-set' (additive only)              → y/yes
  #   - sub_type == 'modify-sharing-rule' AND plan.narrows_access        → CONFIRM
  #   - sub_type == 'modify-sharing-rule' (widening only)                → y/yes
  #   - sub_type == 'modify-restriction-rule' AND plan.tightens          → CONFIRM
  #   - sub_type == 'modify-restriction-rule' (loosening only)           → y/yes
  #   - sub_type ∈ {'create-permission-set',
  #                 'create-permission-set-group',
  #                 'create-sharing-rule',
  #                 'create-restriction-rule'}                            → y/yes
  #   - scope == 'large' or inaccurate-claims only                       → y/yes
  # ═══════════════════════════════════════════════════════════════

  - id: gate-pre-execute
    prompt: |
      You are the in-workflow confirm gate (pre-execute) for
      sf-permission-change. Per ADR-0020 §2, this gate is deliberately
      strict because this family has the highest blast radius of any
      Salesforce task family.

      ## Display

      ```
      ───────────────────────────────────────────────────────────────
      sf-permission-change — pre-execute gate

      Ticket:       $extract-jira-key.output.ticket
      Sub-type:     $classify-sub-type.output.sub_type
      Scope:        $classify-sub-type.output.scope
      Claims:       $smoke-validate-claims.output.claims_accurate
                    (mismatches: see smoke-validate output)

      Plan summary: $plan.output.summary
                    (full plan in $ARTIFACTS_DIR/plan.md)

      Blast radius (from plan):
        Files changed:        $plan.output.files_changed
        Permissions added:    $plan.output.added_count
        Permissions removed:  $plan.output.removed_count
        Removes access:       $plan.output.removes_access
        Narrows sharing:      $plan.output.narrows_access
        OWD direction:        $plan.output.owd_direction  (only if modify-owd)
        Affects admin:        $classify-sub-type.output.affects_admin_profile
        Affects critical:     $classify-sub-type.output.affects_critical_object

      Why this gate fired:
        <list reasons: modify-owd / delete-* / modify-profile / removes-access /
         narrows-sharing / tightens-restriction / scope=large / inaccurate-claims>

      ───────────────────────────────────────────────────────────────
      Acceptance:

        IF sub_type == 'modify-owd':
          Required literal:  CONFIRM-OWD  (uppercase, exact, hyphen included)
                             Bare `CONFIRM` is REJECTED — OWD changes have
                             a unique confirmation form (ADR-0020 §2) to
                             prevent muscle-memory rubber-stamping.

        ELSE IF the change removes/narrows access OR sub_type is delete-*:
          Required literal:  CONFIRM  (uppercase, exact)
                             `y` / `yes` is REJECTED here.

        ELSE (additive create-* / non-destructive modify-* / scope=large /
              inaccurate-claims-only):
          Accept:  `y` / `yes` (case-insensitive)

        ALWAYS accept `n` / `no` / empty to abort.
      ───────────────────────────────────────────────────────────────
      ```

      ## Task

      Show the engineer the plan summary, the blast radius numbers, and
      the trigger reason(s). Wait for response. Emit structured output.

      Validate the acceptance literal strictly:
        - `CONFIRM-OWD` only counts for modify-owd.
        - `CONFIRM` only counts for non-OWD destructive cases.
        - Otherwise reject the unexpected literal and re-prompt once.

      If the engineer aborts, the workflow stops cleanly. No metadata is
      changed; no Jira transition occurs; the run log records the abort.
    depends_on: [plan, classify-sub-type, smoke-validate-claims]
    # Per ADR-0020 §2: the gate fires for ALL sub-types except the one
    # explicit skip case (modify-permission-set-group + small + accurate
    # claims). The confirmation form varies — modify-permission-set
    # without removes_access still gates with y/yes, not skip.
    #
    # Written as a disjunction (rather than negated conjunction) to match
    # the expression style used in sf-apex-change.yaml and avoid relying
    # on `!()` operator availability in Archon's expression grammar.
    when: >-
      $classify-sub-type.output.sub_type != 'modify-permission-set-group' ||
      $classify-sub-type.output.scope != 'small' ||
      $smoke-validate-claims.output.claims_accurate != 'true'
    context: fresh
    output_format:
      type: object
      properties:
        proceed:
          type: string
          enum: ["true", "false"]
        confirmation_form:
          type: string
          enum: ["CONFIRM-OWD", "CONFIRM", "y", "n"]
        reasoning:
          type: string
      required: [proceed, confirmation_form, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: EXECUTE
  # opus[1m] only because some profile XMLs are very large; smaller
  # changes still fit in sonnet's context. Per ADR-0020 §9, the
  # opus[1m] node typically only fires for modify-profile on a large
  # profile or modify-owd where the doc reasoning chain is non-trivial.
  # ═══════════════════════════════════════════════════════════════

  - id: execute
    command: sf-permission-change-execute
    depends_on: [plan, gate-pre-execute]
    trigger_rule: none_failed_min_one_success
    when: "$gate-pre-execute.output.proceed != 'false'"
    context: fresh
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: VALIDATE
  # Composite per ADR-0020 §3:
  #   1. scripts/deploy-to-scratch.sh — structural validity only
  #      (scratch orgs don't faithfully validate sharing; caveat
  #      surfaced in the structured output and in the doc step)
  #   2. Static blast-radius diff (inline; no new script)
  #   3. Custom Permission orphan check (grep force-app/)
  #   4. OWD downgrade direction (only if modify-owd; informational)
  #   5. Sharing rule recipient existence (only if create/modify
  #      sharing rule)
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    command: sf-permission-change-validate
    depends_on: [execute]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6.5: GATE — post-validate (paranoia checks per ADR-0020 §4)
  #
  # Fires when validate reports EITHER:
  #   - A custom permission was orphaned (removed grant but Apex/Flow
  #     code still calls FeatureManagement.checkPermission for it)
  #   - An admin profile (System Administrator-class) was locked out
  #     of a critical object (viewAllRecords / modifyAllRecords removed)
  #
  # Confirmation form: CONFIRM literal. Engineer can override (the
  # orphan/lockout is intentional, e.g., feature-flag retirement) or
  # abort.
  # ═══════════════════════════════════════════════════════════════

  - id: gate-post-validate
    prompt: |
      You are the post-validate gate. The validation step flagged a
      paranoia-level concern that needs engineer judgment before the
      workflow continues to document / update-jira.

      ## Display

      ```
      ───────────────────────────────────────────────────────────────
      sf-permission-change — post-validate gate

      Validation summary:
        Deploy to scratch:       $validate.output.deploy_result
                                 (caveat: scratch orgs do NOT faithfully
                                  simulate sharing/OWD behavior; deploy
                                  success = structural validity only)
        Blast radius diff:       $validate.output.blast_radius_summary
        Custom perm orphan:      $validate.output.orphan_result
        OWD direction:           $validate.output.owd_direction
        Admin lockout check:     $validate.output.admin_lockout_result
        Recipient existence:     $validate.output.recipient_result

      Issues found:
        <list per the validate output's `failure_reasons[]`>

      ───────────────────────────────────────────────────────────────
      Acceptance:

        Required literal: CONFIRM  (uppercase, exact)
                          `y` / `yes` is REJECTED here. The paranoia
                          check is real and the typed-CONFIRM enforces
                          a re-read.

        Always accept `n` / `no` / empty to abort.

      If you abort, the metadata change remains in the working tree;
      no docs are written, no Jira comment is posted, the run log
      records the abort. Engineer can fix and re-run, or revert via git.
      ───────────────────────────────────────────────────────────────
      ```

      ## Task

      Surface the validation details. Get the engineer's response. Emit
      structured output.
    depends_on: [validate]
    when: >-
      $validate.output.orphan_result == 'warn' ||
      $validate.output.admin_lockout_result == 'fail'
    context: fresh
    output_format:
      type: object
      properties:
        proceed:
          type: string
          enum: ["true", "false"]
        confirmation_form:
          type: string
          enum: ["CONFIRM", "n"]
        reasoning:
          type: string
      required: [proceed, confirmation_form, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: DOCUMENT
  # Aggressively updates every doc that references the changed
  # artifacts. Writes to docs/security/ per ADR-0013. Includes draft-
  # ADR mode per ADR-0020 §6 for posture-shifts.
  # ═══════════════════════════════════════════════════════════════

  - id: document
    command: sf-permission-change-document
    depends_on: [validate, gate-post-validate]
    trigger_rule: none_failed_min_one_success
    when: >-
      $validate.output.overall_result == 'pass' &&
      $gate-post-validate.output.proceed != 'false'
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 8: UPDATE JIRA
  # Suppressed when --orchestrated true is in $ARGUMENTS per ADR-0017. The
  # orchestrator handles cross-family Jira write-back.
  # ═══════════════════════════════════════════════════════════════

  - id: update-jira-success
    command: update-jira-on-completion
    depends_on: [document, validate]
    when: >-
      ! $ARGUMENTS contains '--orchestrated true' &&
      $validate.output.overall_result == 'pass'
    context: fresh

  - id: update-jira-failure
    command: update-jira-on-failure
    depends_on: [validate, gate-pre-execute, gate-post-validate]
    trigger_rule: none_failed_min_one_success
    when: >-
      ! $ARGUMENTS contains '--orchestrated true' &&
      ($validate.output.overall_result == 'fail' ||
       $gate-pre-execute.output.proceed == 'false' ||
       $gate-post-validate.output.proceed == 'false')
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 9: LOG
  # Always runs. Emits one run-log line, one cost-log JSONL record,
  # and (when orchestrated) one family_result JSON to disk at
  # _internal/orchestrator-runs/$ORCHESTRATOR_RUN_ID/sf-permission-change.json
  # for the orchestrator to read.
  # ═══════════════════════════════════════════════════════════════

  - id: log-workflow-run
    bash: |
      set -euo pipefail

      TICKET=$(printf '%s' "$ARGUMENTS" | grep -oE '^[A-Z][A-Z0-9]+-[0-9]+' | head -1)
      SUB_TYPE="$classify-sub-type.output.sub_type"
      SCOPE="$classify-sub-type.output.scope"
      # Derive orchestrated flag from $ARGUMENTS — matches the disk-write
      # detector below and the sf-integration-change pattern. Earlier
      # ${orchestrated:-false} reads a never-set env var and always emitted
      # "false", silently misclassifying orchestrated runs in the cost log.
      ORCHESTRATED="false"
      printf '%s' "$ARGUMENTS" | grep -qE '\-\-orchestrated[[:space:]]+true' && ORCHESTRATED="true"

      # Validate result with shell defaults for skipped nodes.
      VALIDATE_RESULT="${validate_output_overall_result:-skipped}"
      PRE_GATE_DECISION="${gate_pre_execute_output_proceed:-skipped}"
      POST_GATE_DECISION="${gate_post_validate_output_proceed:-skipped}"

      # Prefer Archon's nested-field substitution when available.
      [ "$validate.output.overall_result" != "" ] && VALIDATE_RESULT="$validate.output.overall_result" || true
      [ "$gate-pre-execute.output.proceed" != "" ] && PRE_GATE_DECISION="$gate-pre-execute.output.proceed" || true
      [ "$gate-post-validate.output.proceed" != "" ] && POST_GATE_DECISION="$gate-post-validate.output.proceed" || true

      if [ "$VALIDATE_RESULT" = "pass" ] && [ "$PRE_GATE_DECISION" != "false" ] && [ "$POST_GATE_DECISION" != "false" ]; then
        RESULT="success"
      elif [ "$PRE_GATE_DECISION" = "false" ] || [ "$POST_GATE_DECISION" = "false" ]; then
        RESULT="gate-aborted"
      else
        RESULT="failure"
      fi

      # Run log (one line, human-readable).
      RUN_LOG="_internal/harness-runs.log"
      mkdir -p "$(dirname "$RUN_LOG")"
      printf '%s  %s  sf-permission-change  sub_type=%s  scope=%s  result=%s  orchestrated=%s\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${TICKET}" "${SUB_TYPE}" "${SCOPE}" "${RESULT}" "${ORCHESTRATED}" \
        >> "$RUN_LOG"

      # Cost log (JSONL, per ADR-0016).
      # Typical sf-permission-change shape per ADR-0020 §9:
      #   ~2 haiku, ~8 sonnet, ~1 opus_1m, ~5 bash
      # Lighter than sf-apex-change because XML edits are mechanical;
      # only modify-profile on a large profile or modify-owd hits opus[1m].
      ENGAGEMENT_ALIAS=$(grep -E '^engagement_alias:' engagement.yaml 2>/dev/null | head -1 | sed -E 's/^engagement_alias:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' || echo "unknown")
      HARNESS_VERSION=$(grep -E '^harness_version:' engagement.yaml 2>/dev/null | head -1 | sed -E 's/^harness_version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' || echo "unknown")
      EST_INPUT_TOKENS=180000
      EST_OUTPUT_TOKENS=22000
      EST_COST_USD=$(python3 -c "
input_tok = $EST_INPUT_TOKENS / 1_000_000
output_tok = $EST_OUTPUT_TOKENS / 1_000_000
# Weighted blend: 2 haiku, 8 sonnet, 1 opus_1m, 5 bash
# Bash nodes contribute 0. sonnet dominates input; opus_1m dominates per-token cost on its slice.
cost = (input_tok * 0.55 * 3) + (output_tok * 0.55 * 15) + (input_tok * 0.35 * 20) + (output_tok * 0.35 * 100) + (input_tok * 0.10 * 1) + (output_tok * 0.10 * 5)
print(f'{cost:.2f}')
")

      COST_LOG="_internal/cost-log.jsonl"
      printf '{\"ts\":\"%s\",\"workflow\":\"sf-permission-change\",\"ticket\":\"%s\",\"engagement\":\"%s\",\"harness_version\":\"%s\",\"nodes\":{\"haiku\":2,\"sonnet\":8,\"opus_1m\":1,\"bash\":5},\"est_input_tokens\":%d,\"est_output_tokens\":%d,\"est_cost_usd\":%s,\"result\":\"%s\",\"sub_type\":\"%s\",\"scope\":\"%s\",\"orchestrated\":%s}\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${TICKET}" "${ENGAGEMENT_ALIAS}" "${HARNESS_VERSION}" \
        "$EST_INPUT_TOKENS" "$EST_OUTPUT_TOKENS" "$EST_COST_USD" "${RESULT}" "${SUB_TYPE}" "${SCOPE}" "${ORCHESTRATED}" \
        >> "$COST_LOG"

      # Orchestrated-mode contract per ADR-0017: when running under
      # sf-orchestrator, emit family_result.json to the orchestrator's
      # collection directory ON DISK. The orchestrator's
      # invoke-families-in-sequence reads the file (not stdout).
      if printf '%s' "$ARGUMENTS" | grep -qE '\-\-orchestrated[[:space:]]+true'; then
        if [ -z "${ORCHESTRATOR_RUN_ID:-}" ]; then
          echo "  ⚠ --orchestrated true but ORCHESTRATOR_RUN_ID is unset; can't emit family_result.json" >&2
        else
          ORCHESTRATOR_DIR="_internal/orchestrator-runs/${ORCHESTRATOR_RUN_ID}"
          mkdir -p "$ORCHESTRATOR_DIR"
          FAMILY_RESULT_FILE="$ORCHESTRATOR_DIR/sf-permission-change.json"

          if [ "$PRE_GATE_DECISION" = "false" ] || [ "$POST_GATE_DECISION" = "false" ]; then
            FAMILY_STATUS="gate-aborted"
          elif [ "$RESULT" = "success" ]; then
            FAMILY_STATUS="success"
          else
            FAMILY_STATUS="failure"
          fi

          FILES_CHANGED="${execute_output_files_changed_actual:-[]}"
          BLAST_RADIUS="${validate_output_blast_radius_summary:-{}}"
          DOCS_UPDATED="${document_output_docs_updated:-[]}"
          CONFIRMATION_FORM="${gate_pre_execute_output_confirmation_form:-skipped}"

          python3 <<PYEOF
      import json
      result = {
          "family": "sf-permission-change",
          "status": "$FAMILY_STATUS",
          "ticket": "$TICKET",
          "sub_type": "$SUB_TYPE",
          "scope": "$SCOPE",
          "files_changed_actual": $FILES_CHANGED,
          "blast_radius": $BLAST_RADIUS,
          "validation_results": {
              "overall": "$VALIDATE_RESULT",
          },
          "confirmation_form_used": "$CONFIRMATION_FORM",
          "doc_updates": $DOCS_UPDATED,
          "errors": [],
      }
      with open("$FAMILY_RESULT_FILE", "w") as out:
          json.dump(result, out, indent=2)
      PYEOF
          echo "  → family_result.json written for orchestrator: $FAMILY_RESULT_FILE"
        fi
      fi
    depends_on: [update-jira-success, update-jira-failure]
    trigger_rule: none_failed_min_one_success
