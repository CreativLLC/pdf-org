name: sf-flow-change
description: |
  Second task-family workflow per ADR-0003. Handles record-triggered,
  scheduled, screen, autolaunched Flows + subflows — create / modify /
  activate / deactivate / delete. Sub-types, gates, validation strategy
  locked in ADR-0019.

  Invoked by sf-dispatcher (`/sf <TICKET>` → classifier picks this workflow
  → dispatcher's confirm gate → `archon run sf-flow-change ...`) OR by
  sf-orchestrator with `--orchestrated true` appended to $ARGUMENTS for
  multi-family tickets per ADR-0017.

  Inputs:
    $ARGUMENTS  — passed by sf-dispatcher's or sf-orchestrator's invoke node.
                  Single-family form: `<TICKET> "<description>"`.
                  Orchestrated form:  `<TICKET> --orchestrated true "<description>"`.
                  Family workflows detect orchestrated mode by grep-ing
                  $ARGUMENTS for `--orchestrated true`. When detected,
                  update-jira-* nodes are skipped (the orchestrator handles
                  consolidated Jira write-back) and the log-workflow-run
                  node additionally writes family_result.json to disk for
                  the orchestrator to read.

  Structural backbone per ADR-0003:
    1. extract-jira-key             (deterministic)
    2. pull-jira-context            (command: pull-jira-context)
    3. classify-sub-type            (LLM, scoped to this task family)
    4. smoke-validate-claims        (verify ticket's concrete claims)
    5. verify-org-context           (command: verify-org-context)
    6. load-engagement-context      (command: load-engagement-context)
    7. plan                         (command: sf-flow-change-plan)
    8. gate-pre-execute             (interactive, conditional per ADR-0019 §8)
    9. execute                      (command: sf-flow-change-execute)
    10. validate                    (command: sf-flow-change-validate)
    11. gate-post-validate          (interactive, conditional per ADR-0019 §8)
    12. document                    (command: sf-flow-change-document)
    13. update-jira                 (skipped when --orchestrated true in $ARGUMENTS)
    14. log-workflow-run

provider: claude
model: sonnet

# Orchestrated mode (per ADR-0017) is detected by grep'ing for
# '--orchestrated true' in $ARGUMENTS — matching the sf-apex-change.yaml +
# sf-metadata-change.yaml pattern. The earlier `inputs.orchestrated`
# declared-schema form was switched away from because Archon's
# auto-binding of $ARGUMENTS tokens to declared inputs isn't verified.

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: FETCH & CLASSIFY
  # ═══════════════════════════════════════════════════════════════

  - id: extract-jira-key
    prompt: |
      Extract the Jira ticket key from $ARGUMENTS.

      Input: $ARGUMENTS  (e.g., `--ticket ACME-201 --description "..."`)

      The ticket key must match `^[A-Z][A-Z0-9]+-\d+$`. If absent or
      malformed, fail with:
        `error: missing or invalid --ticket. Expected like ACME-201.`

      Output ONLY the bare ticket key (no quotes, markdown, or extra text).
    allowed_tools: []
    output_format:
      type: object
      properties:
        ticket:
          type: string
          pattern: "^[A-Z][A-Z0-9]+-\\d+$"
        description:
          type: string
      required: [ticket, description]

  - id: pull-jira-context
    command: pull-jira-context
    depends_on: [extract-jira-key]
    context: fresh

  - id: classify-sub-type
    prompt: |
      You are the sf-flow-change sub-type classifier. The dispatcher (or
      orchestrator) already chose this workflow; your job is to pick the
      correct sub-type from ADR-0019 §1, plus the scope and a few side
      flags that downstream gates use.

      ## Context

      ### Jira ticket
      $pull-jira-context.output

      ### Engineer's free-form description
      $extract-jira-key.output.description

      ## Sub-types (ADR-0019)

      | sub_type                       | trigger                                                                  |
      |--------------------------------|--------------------------------------------------------------------------|
      | create-record-triggered-flow   | New `.flow-meta.xml` with `<processType>RecordTriggered</processType>` (or AutoLaunched + `<start>` with `<object>`+`<recordTriggerType>`) |
      | create-scheduled-flow          | New `.flow-meta.xml` with `<start>` containing `<schedule>`              |
      | create-screen-flow             | New `.flow-meta.xml` with `<processType>Flow</processType>` (user UI)    |
      | create-autolaunched-flow       | New `.flow-meta.xml` with `<processType>AutoLaunched</processType>`, invoked from Apex/other Flow, NOT primarily a subflow |
      | create-subflow                 | New `.flow-meta.xml` designed to be invoked by another Flow (ticket states this intent) |
      | modify-flow                    | Existing `.flow-meta.xml` changed (any element)                          |
      | activate-flow                  | `<status>` changes from `Draft` (or absent) to `Active`                  |
      | deactivate-flow                | `<status>` changes from `Active` to `Obsolete` (DESTRUCTIVE)             |
      | delete-flow                    | `.flow-meta.xml` removed (DESTRUCTIVE)                                   |

      ## Precedence (when ticket implies multiple)

      `delete-flow` > `deactivate-flow` > `modify-flow` (when modifying an
      Active Flow) > `create-*` > `activate-flow`.

      Higher-precedence sub-types have stricter gates; over-gate is safer
      than under-gate. An inline activation as part of `create-*` (the new
      Flow ships with `<status>Active</status>` from day one) is NOT a
      separate `activate-flow` — it's part of the create.

      ## Scope

      Estimate, conservatively (round up when uncertain):
      - small:  Flow has fewer than 10 elements, OR modify-flow touches 1-2 existing elements
      - medium: Flow has 10-19 elements, OR modify-flow touches 3-4 existing elements
      - large:  Flow has 20+ elements, OR modify-flow touches 5+ existing elements,
                OR the change spans multiple Flows (subflow + parent)

      ## Side flags

      - `touches_dml_elements`: `"true"` if the change adds, removes, or
        modifies any `<recordUpdates>` / `<recordCreates>` / `<recordDeletes>`
        element. Triggers the pre-execute gate for modify-flow of an Active
        Flow per ADR-0019 §8.
      - `touches_invocable_apex`: `"true"` if the change involves
        `<actionCalls type="apex">` (invocable Apex). The validate step
        will verify the referenced classes exist.
      - `touches_subflow_relationships`: `"true"` if the change adds or
        removes `<subflows>` elements (Flow-to-Flow dependencies).
      - `needs_external_research`: `"true"` if the fix depends on
        specifics of an external library, API, or Salesforce platform
        feature whose behavior is NOT apparent from the engagement docs
        or codebase.

      ## Currently-active detection

      For `modify-flow`, `activate-flow`, and `deactivate-flow`, also
      attempt to read the current state of the Flow's `<status>` from
      `force-app/main/default/flows/<FlowName>.flow-meta.xml`:
      - `currently_active`: `"true"` if `<status>Active</status>` is present
                            in the existing file (or the file's tracked
                            version in `git show HEAD:<path>`)
      - `currently_active`: `"false"` if absent, `<status>Draft</status>`,
                            `<status>Obsolete</status>`, or the file
                            doesn't yet exist (for create-* sub-types)
    depends_on: [pull-jira-context]
    model: haiku
    allowed_tools: [Read, Glob, Grep, Bash]
    context: fresh
    output_format:
      type: object
      properties:
        sub_type:
          type: string
          enum:
            - create-record-triggered-flow
            - create-scheduled-flow
            - create-screen-flow
            - create-autolaunched-flow
            - create-subflow
            - modify-flow
            - activate-flow
            - deactivate-flow
            - delete-flow
        scope:
          type: string
          enum: [small, medium, large]
        touches_dml_elements:
          type: string
          enum: ["true", "false"]
        touches_invocable_apex:
          type: string
          enum: ["true", "false"]
        touches_subflow_relationships:
          type: string
          enum: ["true", "false"]
        needs_external_research:
          type: string
          enum: ["true", "false"]
        currently_active:
          type: string
          enum: ["true", "false"]
        affected_flow_names:
          type: array
          items:
            type: string
        reasoning:
          type: string
      required:
        - sub_type
        - scope
        - touches_dml_elements
        - touches_invocable_apex
        - touches_subflow_relationships
        - needs_external_research
        - currently_active
        - affected_flow_names
        - reasoning

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1.5: SMOKE-VALIDATE
  # Verify the ticket's concrete claims (Flow names, referenced Apex
  # classes, referenced fields/objects) match the codebase before any
  # skip decision. Also pre-computes caller-impact for destructive
  # sub-types so the pre-execute gate has the data it needs.
  # ═══════════════════════════════════════════════════════════════

  - id: smoke-validate-claims
    prompt: |
      You are the smoke validator. Your job: check the ticket's claims
      about the Flow(s), referenced Apex, and touched fields/objects are
      ACCURATE so downstream gates rest on a reliable foundation. For
      destructive sub-types, ALSO produce a caller-impact list for the
      pre-execute gate.

      ## Context

      ### Ticket
      $pull-jira-context.output

      ### Classifier output
      $classify-sub-type.output

      ## Task — claim accuracy

      Extract concrete, verifiable claims from the ticket body and recent
      comments:
      - Flow names referenced (e.g. `Renewal_Auto_Create`).
      - Apex class names referenced (called from the Flow, or that call
        the Flow).
      - File paths in `force-app/main/default/flows/` or
        `force-app/main/default/classes/`.
      - Field references (`Object__c.Field__c`).
      - `<actionCalls>`, `<recordUpdates>`, `<recordCreates>`, `<recordDeletes>`,
        `<subflows>` element references.

      Then verify each concrete claim against the engagement repo:
      - Read cited file paths. Confirm existence.
      - Grep for cited Flow names: `grep -rn "<FlowName>" force-app/main/default/`.
      - Grep for cited Apex class names: `grep -rn "<ClassName>" force-app/main/default/`.
      - For field references, check the relevant
        `force-app/main/default/objects/<Obj>.object-meta.xml` or
        `force-app/main/default/objects/<Obj>/fields/<Field>.field-meta.xml`.

      ## Task — caller-impact (only for destructive sub-types)

      If `$classify-sub-type.output.sub_type` ∈ {`delete-flow`,
      `deactivate-flow`}, OR `$classify-sub-type.output.sub_type ==
      'modify-flow'` AND `currently_active == 'true'` AND
      `touches_dml_elements == 'true'`, compute the caller-impact for
      each Flow in `affected_flow_names`:

      1. Grep Apex source for the Flow's name (Flow.Interview / Flow.start /
         flow-by-name references):
         `grep -rn "<FlowName>" force-app/main/default/classes/ force-app/main/default/triggers/`
      2. Grep other Flow XML for `<subflows><flowName><FlowName>`:
         `grep -rln "<flowName>${FLOW_NAME}</flowName>" force-app/main/default/flows/`
      3. Build a per-Flow caller list of (file-path, line-number,
         calling-context).

      Write the caller-impact list to `$ARTIFACTS_DIR/caller-impact.txt`
      as plain text, one caller per line.

      ## Budget

      Spend ~45 seconds. Verify the 2-3 most load-bearing claims
      (typically: the affected Flow file, the most-cited Apex class).
      Caller-impact is full-pass (no budget shortcut) because the gate
      depends on it.

      Prefer false-negative safety (flag inaccurate when uncertain) over
      false-positive (skipping a gate on shaky ground).

      If the ticket has NO concrete claims (purely descriptive — e.g.,
      "the renewal flow is broken" with no Flow names, no file paths),
      default `claims_accurate` to `"false"`.

      ## Output

      Set `claims_accurate`:
      - `"true"`  — the claims you checked match the current code; the
                    ticket body is a reliable spec.
      - `"false"` — one or more claims don't match reality.

      Include `mismatches` as a list of strings, one per discrepancy.
      Set `caller_count` to the total number of callers found (0 if
      not a destructive sub-type).
    depends_on: [classify-sub-type]
    allowed_tools: [Read, Glob, Grep, Bash, Write]
    context: fresh
    output_format:
      type: object
      properties:
        claims_accurate:
          type: string
          enum: ["true", "false"]
        mismatches:
          type: array
          items:
            type: string
        caller_count:
          type: integer
        caller_impact_artifact:
          type: string
        reasoning:
          type: string
      required: [claims_accurate, mismatches, caller_count, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: SF-SPECIFIC CONTEXT
  # ═══════════════════════════════════════════════════════════════

  - id: verify-org-context
    command: verify-org-context
    depends_on: [smoke-validate-claims]
    context: fresh

  - id: load-engagement-context
    command: load-engagement-context
    depends_on: [verify-org-context]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: PLAN
  # ═══════════════════════════════════════════════════════════════

  - id: plan
    command: sf-flow-change-plan
    depends_on: [load-engagement-context, classify-sub-type, smoke-validate-claims]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: GATE (pre-execute, conditional per ADR-0019 §8)
  # Fires when ANY:
  #   - sub_type ∈ {delete-flow, deactivate-flow}
  #   - sub_type == modify-flow AND currently_active == 'true'
  #   - sub_type == modify-flow AND touches_dml_elements == 'true'
  #   - scope == 'large'
  #   - smoke-validate flagged inaccurate claims
  # The activation-reference gate (verifying invocable Apex exists before
  # activating a Flow that calls it) fires post-validate, not here — the
  # static reference check runs in validate.
  # ═══════════════════════════════════════════════════════════════

  - id: gate-pre-execute
    prompt: |
      You are the in-workflow confirm gate (pre-execute). Per ADR-0019 §8,
      this gate fires only when the change is destructive, semantically
      shifts an Active Flow, is large, or based on inaccurate ticket claims.

      ## Display

      ```
      ───────────────────────────────────────────────
      Ticket:           $extract-jira-key.output.ticket
      Sub-type:         $classify-sub-type.output.sub_type
      Affected Flows:   $classify-sub-type.output.affected_flow_names
      Currently Active: $classify-sub-type.output.currently_active
      Scope:            $classify-sub-type.output.scope
      Claims:           $smoke-validate-claims.output.claims_accurate
                        (mismatches: see smoke-validate output)

      Plan:             $plan.output  (summary — full plan in $ARTIFACTS_DIR/plan.md)

      Why this gate fired:
        <list the trigger(s): delete-flow / deactivate-flow /
         modify-flow-of-active / modify-flow-with-dml-change /
         scope=large / claims_accurate=false>

      Caller impact (destructive sub-types only):
        <render $smoke-validate-claims.output.caller_count and reference
         $ARTIFACTS_DIR/caller-impact.txt — list the callers inline if
         caller_count <= 5; else summarize counts by category and point
         to the artifact>

      Acceptance:
        - For DESTRUCTIVE sub-types (delete-flow, deactivate-flow) where
          caller_count > 0: require literal `CONFIRM` (uppercase, exact).
        - For modify-flow of an Active flow, modify-flow with DML element
          changes, scope=large, or inaccurate claims: accept `y` / `yes`.
        - Always accept `n` / `no` / empty to abort.
      ───────────────────────────────────────────────
      ```

      ## Task

      Show the engineer the plan summary, the trigger reason(s), and (for
      destructive sub-types) the caller-impact summary. Wait for response.
      Emit structured output.

      If the engineer aborts, the workflow stops cleanly. No Flow XML is
      changed in the working tree past the plan step; no scratch-org deploy
      occurs; no Jira transition; the run log records the abort.

      Note: The plan step is read-only (it does not modify files), so an
      abort here is safe to recover from. The execute step is where files
      change.
    depends_on: [plan, classify-sub-type, smoke-validate-claims]
    when: >-
      $classify-sub-type.output.sub_type == 'delete-flow' ||
      $classify-sub-type.output.sub_type == 'deactivate-flow' ||
      ($classify-sub-type.output.sub_type == 'modify-flow' && $classify-sub-type.output.currently_active == 'true') ||
      ($classify-sub-type.output.sub_type == 'modify-flow' && $classify-sub-type.output.touches_dml_elements == 'true') ||
      $classify-sub-type.output.scope == 'large' ||
      $smoke-validate-claims.output.claims_accurate == 'false'
    context: fresh
    output_format:
      type: object
      properties:
        proceed:
          type: string
          enum: ["true", "false"]
        confirmation_form:
          type: string
          enum: ["CONFIRM", "y", "n"]
        reasoning:
          type: string
      required: [proceed, confirmation_form, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: EXECUTE
  # ═══════════════════════════════════════════════════════════════

  - id: execute
    command: sf-flow-change-execute
    depends_on: [plan, gate-pre-execute]
    # When gate-pre-execute is skipped (no trigger fired), this still runs.
    # When it ran, only proceed if proceed == 'true'.
    trigger_rule: none_failed_min_one_success
    when: "$gate-pre-execute.output.proceed != 'false'"
    context: fresh
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: VALIDATE
  # Composite — the command internally orchestrates:
  #   • scripts/deploy-to-scratch.sh      (always)
  #   • activation step (sf data query against FlowDefinitionView) — only when
  #     sub_type involves activation/deactivation or new Flow ships Active
  #   • scripts/check-flow-references.sh  (always — static reference check
  #     against changed .flow-meta.xml files)
  #   • scripts/run-apex-tests.sh         (always — runs the test set
  #     defined in ADR-0019 §7; engagement.yaml.tests.flows.<FlowName>
  #     mapping + grep-referencing + regression_suite)
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    command: sf-flow-change-validate
    depends_on: [execute]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6.5: GATE (post-validate, conditional per ADR-0019 §8)
  # Fires when ANY:
  #   - validate detected the Flow calls invocable Apex that doesn't exist
  #   - validate detected the Flow uses fields/objects that don't exist
  #   - the Flow has no fault paths defined on <actionCalls> (warning)
  #   - activation_result == fail (deploy succeeded but Flow didn't activate)
  # ═══════════════════════════════════════════════════════════════

  - id: gate-post-validate
    prompt: |
      You are the in-workflow confirm gate (post-validate). The static
      reference checks or activation verification flagged issues that need
      engineer judgment before the workflow continues to document / Jira.

      ## Display

      ```
      ───────────────────────────────────────────────
      Validation results:
        Deploy to scratch:      $validate.output.deploy_result
        Activation:             $validate.output.activation_result
                                ($validate.output.activation_detail)
        Reference check:        $validate.output.references_result
                                (missing: $validate.output.missing_references)
        Apex tests:             $validate.output.tests_result
                                (per-test results in $validate.output.tests_artifact)
        Fault-path coverage:    $validate.output.fault_paths_result
                                (WARNING — engineer-judgment, not blocker)

      Issues found:
        <list per the validate output>

      Acceptance:
        - If references_result == 'fail' due to missing INVOCABLE APEX or
          missing CUSTOM OBJECT (the most serious — Flow will fail at first
          run): require `y`/`yes` with explicit acknowledgment of override.
        - If references_result == 'fail' due to missing FIELD only (often
          a managed-package whitelist gap): accept `y`/`yes`.
        - If activation_result == 'fail': accept `y`/`yes` only if
          references_result is also `pass` — otherwise the Flow can't
          be expected to activate; engineer should fix and re-run.
        - If fault_paths_result == 'warning' is the ONLY issue: accept
          `y`/`yes` (warning is informational, not blocker).
        - Always accept `n`/`no`/empty to abort.

      If you abort here, the Flow XML change remains in the working tree
      but no docs are written, no Jira comment is posted, and the run log
      records the abort. Fix the issues and re-run, or revert the tree.
      ───────────────────────────────────────────────
      ```

      ## Task

      Surface the validation details to the engineer, get their response,
      emit structured output.
    depends_on: [validate]
    when: >-
      $validate.output.references_result == 'fail' ||
      $validate.output.activation_result == 'fail' ||
      $validate.output.fault_paths_result == 'warning'
    context: fresh
    output_format:
      type: object
      properties:
        proceed:
          type: string
          enum: ["true", "false"]
        confirmation_form:
          type: string
          enum: ["CONFIRM", "y", "n"]
        reasoning:
          type: string
      required: [proceed, confirmation_form, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: DOCUMENT
  # ═══════════════════════════════════════════════════════════════

  - id: document
    command: sf-flow-change-document
    depends_on: [validate, gate-post-validate]
    trigger_rule: none_failed_min_one_success
    when: >-
      $validate.output.overall_result == 'pass' &&
      $gate-post-validate.output.proceed != 'false'
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 8: UPDATE JIRA
  # Two branches: success path (post structured comment, transition to
  # in_review) and failure path (post failure comment, transition back to
  # ready_for_dev). Only one fires per run.
  #
  # Per ADR-0017: both nodes are SKIPPED when --orchestrated true is in $ARGUMENTS.
  # The orchestrator handles consolidated Jira write-back.
  # ═══════════════════════════════════════════════════════════════

  - id: update-jira-success
    command: update-jira-on-completion
    depends_on: [document, validate]
    when: >-
      $validate.output.overall_result == 'pass' &&
      ! $ARGUMENTS contains '--orchestrated true'
    context: fresh

  - id: update-jira-failure
    command: update-jira-on-failure
    depends_on: [validate, gate-pre-execute, gate-post-validate]
    trigger_rule: none_failed_min_one_success
    when: >-
      ($validate.output.overall_result == 'fail' ||
       $gate-pre-execute.output.proceed == 'false' ||
       $gate-post-validate.output.proceed == 'false') &&
      ! $ARGUMENTS contains '--orchestrated true'
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 9: LOG (always — orchestrated or not)
  # Per ADR-0016: emits one JSONL record to _internal/cost-log.jsonl.
  # Per ADR-0017: when orchestrated, writes family_result JSON to
  # _internal/orchestrator-runs/$ORCHESTRATOR_RUN_ID/sf-flow-change.json
  # for the orchestrator to collect.
  # ═══════════════════════════════════════════════════════════════

  - id: log-workflow-run
    bash: |
      set -euo pipefail

      TICKET=$(printf '%s' "$ARGUMENTS" | grep -oE '^[A-Z][A-Z0-9]+-[0-9]+' | head -1)
      SUB_TYPE="$classify-sub-type.output.sub_type"
      SCOPE="$classify-sub-type.output.scope"

      # Validate result: optional fields use shell defaults when the node was skipped.
      VALIDATE_RESULT="${validate_output_overall_result:-skipped}"
      PRE_GATE_DECISION="${gate_pre_execute_output_proceed:-skipped}"
      POST_GATE_DECISION="${gate_post_validate_output_proceed:-skipped}"

      # If Archon supports nested-field substitution, prefer the explicit form; the
      # shell defaults above protect against unset variables for skipped nodes.
      [ "$validate.output.overall_result" != "" ] && VALIDATE_RESULT="$validate.output.overall_result" || true
      [ "$gate-pre-execute.output.proceed" != "" ] && PRE_GATE_DECISION="$gate-pre-execute.output.proceed" || true
      [ "$gate-post-validate.output.proceed" != "" ] && POST_GATE_DECISION="$gate-post-validate.output.proceed" || true

      if [ "$VALIDATE_RESULT" = "pass" ] && [ "$PRE_GATE_DECISION" != "false" ] && [ "$POST_GATE_DECISION" != "false" ]; then
        RESULT="success"
      elif [ "$PRE_GATE_DECISION" = "false" ] || [ "$POST_GATE_DECISION" = "false" ]; then
        RESULT="gate-aborted"
      else
        RESULT="failure"
      fi

      # Derive orchestrated flag from $ARGUMENTS — matches the disk-write
      # detector below and the sf-integration-change pattern. Earlier
      # ${orchestrated:-false} reads a never-set env var and always emitted
      # "false", silently misclassifying orchestrated runs in the cost log.
      ORCHESTRATED_STR="false"
      printf '%s' "$ARGUMENTS" | grep -qE '\-\-orchestrated[[:space:]]+true' && ORCHESTRATED_STR="true"

      RUN_LOG="_internal/harness-runs.log"
      mkdir -p "$(dirname "$RUN_LOG")"
      printf '%s  %s  sf-flow-change  sub_type=%s  scope=%s  result=%s  orchestrated=%s\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${TICKET}" "${SUB_TYPE}" "${SCOPE}" "${RESULT}" "${ORCHESTRATED_STR}" \
        >> "$RUN_LOG"

      # Cost record per ADR-0016. Heuristic estimate (nodes by model × rates).
      # sf-flow-change typical shape: ~2 haiku (extract-key/classify),
      # ~9 sonnet (pull-jira/smoke-validate/verify-org/load-engagement/plan/
      # 2 gates/validate/document), ~2 opus[1m] (execute, document on big Flows),
      # ~3 bash (deploy/activation/references via validate orchestrator).
      ENGAGEMENT_ALIAS=$(grep -E '^engagement_alias:' engagement.yaml 2>/dev/null | head -1 | sed -E 's/^engagement_alias:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' || echo "unknown")
      HARNESS_VERSION=$(grep -E '^harness_version:' engagement.yaml 2>/dev/null | head -1 | sed -E 's/^harness_version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' || echo "unknown")
      EST_INPUT_TOKENS=320000
      EST_OUTPUT_TOKENS=38000
      EST_COST_USD=$(python3 -c "
input_tok = $EST_INPUT_TOKENS / 1_000_000
output_tok = $EST_OUTPUT_TOKENS / 1_000_000
# Weighted blend across node distribution: 2 haiku, 9 sonnet, 2 opus_1m, 3 bash
# Bash nodes contribute 0. Roughly the same shape as sf-apex-change but Flow
# XML is smaller than Apex source — slightly lower input tokens overall.
# Heaviest cost driver remains the opus[1m] execute + document nodes.
cost = (input_tok * 0.7 * 20) + (output_tok * 0.7 * 100) + (input_tok * 0.3 * 3) + (output_tok * 0.3 * 15)
print(f'{cost:.2f}')
")

      COST_LOG="_internal/cost-log.jsonl"
      printf '{\"ts\":\"%s\",\"workflow\":\"sf-flow-change\",\"ticket\":\"%s\",\"engagement\":\"%s\",\"harness_version\":\"%s\",\"nodes\":{\"haiku\":2,\"sonnet\":9,\"opus_1m\":2,\"bash\":3},\"est_input_tokens\":%d,\"est_output_tokens\":%d,\"est_cost_usd\":%s,\"result\":\"%s\",\"sub_type\":\"%s\",\"scope\":\"%s\",\"orchestrated\":\"%s\"}\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${TICKET}" "${ENGAGEMENT_ALIAS}" "${HARNESS_VERSION}" \
        "$EST_INPUT_TOKENS" "$EST_OUTPUT_TOKENS" "$EST_COST_USD" "${RESULT}" "${SUB_TYPE}" "${SCOPE}" "${ORCHESTRATED_STR}" \
        >> "$COST_LOG"

      # Capture per-family fields for the family_result JSON below.
      AFFECTED_FLOWS=$(printf '%s' "$classify-sub-type.output.affected_flow_names" 2>/dev/null || echo '[]')
      FILES_CHANGED=$(printf '%s' "$execute.output.files_changed_actual" 2>/dev/null || echo '[]')
      DOC_UPDATES=$(printf '%s' "$document.output.docs_updated" 2>/dev/null || echo '[]')

      # Orchestrated-mode contract per ADR-0017: when running under
      # sf-orchestrator, emit family_result.json to the orchestrator's
      # collection directory. The orchestrator's invoke-families-in-sequence
      # bash node reads this file (NOT stdout); a missing file trips the
      # contract-violation check.
      if printf '%s' "$ARGUMENTS" | grep -qE '\-\-orchestrated[[:space:]]+true'; then
        if [ -z "${ORCHESTRATOR_RUN_ID:-}" ]; then
          echo "  ⚠ --orchestrated true but ORCHESTRATOR_RUN_ID is unset; can't emit family_result.json" >&2
        else
          ORCHESTRATOR_DIR="_internal/orchestrator-runs/${ORCHESTRATOR_RUN_ID}"
          mkdir -p "$ORCHESTRATOR_DIR"
          FAMILY_RESULT_FILE="$ORCHESTRATOR_DIR/sf-flow-change.json"

          if [ "$PRE_GATE_DECISION" = "false" ] || [ "$POST_GATE_DECISION" = "false" ]; then
            FAMILY_STATUS="gate-aborted"
          elif [ "$RESULT" = "success" ]; then
            FAMILY_STATUS="success"
          else
            FAMILY_STATUS="failure"
          fi

          python3 <<PYEOF
      import json
      result = {
          "family": "sf-flow-change",
          "status": "$FAMILY_STATUS",
          "ticket": "$TICKET",
          "sub_type": "$SUB_TYPE",
          "scope": "$SCOPE",
          "affected_flows": $AFFECTED_FLOWS,
          "files_changed_actual": $FILES_CHANGED,
          "validation_results": {
              "deploy": "${validate_output_deploy_result:-unknown}",
              "activation": "${validate_output_activation_result:-unknown}",
              "references": "${validate_output_references_result:-unknown}",
              "tests": "${validate_output_tests_result:-unknown}",
              "overall": "$VALIDATE_RESULT",
          },
          "doc_updates": $DOC_UPDATES,
          "errors": [],
      }
      with open("$FAMILY_RESULT_FILE", "w") as out:
          json.dump(result, out, indent=2)
      PYEOF
          echo "  → family_result.json written for orchestrator: $FAMILY_RESULT_FILE"
        fi
      fi
    depends_on: [update-jira-success, update-jira-failure, validate, document]
    trigger_rule: none_failed_min_one_success
